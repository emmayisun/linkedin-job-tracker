name: LinkedIn Job Tracker

on:
  schedule:
    # PST 7am-9pm = UTC 15:00-05:00 (every 3 hours)
    - cron: '0 15,18,21 * * *'
    - cron: '0 0,3 * * *'
    # PST 6am = UTC 14:00 (morning catch-up for overnight jobs)
    - cron: '0 14 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        env:
          LI_AT_COOKIE: ${{ secrets.LI_AT_COOKIE }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUN_HOUR_UTC: ${{ github.event.schedule == '0 14 * * *' && '14' || '' }}
        run: python scraper.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f jobs.csv ]; then
            git add jobs.csv
            git diff --cached --quiet || git commit -m "Update jobs.csv — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No jobs.csv to commit (no new jobs found)"
          fi

      - name: Check for new jobs
        id: check
        run: |
          if [ -f has_new_jobs.txt ] && [ "$(cat has_new_jobs.txt)" = "true" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi
          if [ -f cookie_expired.txt ] && [ "$(cat cookie_expired.txt)" = "true" ]; then
            echo "cookie_expired=true" >> $GITHUB_OUTPUT
          else
            echo "cookie_expired=false" >> $GITHUB_OUTPUT
          fi

      - name: Send email notification
        if: steps.check.outputs.has_new == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ADDRESS }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "LinkedIn PM Jobs Alert — ${{ github.run_id }}"
          to: ${{ secrets.EMAIL_ADDRESS }}
          from: LinkedIn Job Tracker <${{ secrets.EMAIL_ADDRESS }}>
          html_body: file://email_body.html
          content_type: text/html

      - name: Send cookie expired alert
        if: steps.check.outputs.cookie_expired == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ADDRESS }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "⚠️ LinkedIn Job Tracker — Cookie Expired"
          to: ${{ secrets.EMAIL_ADDRESS }}
          from: LinkedIn Job Tracker <${{ secrets.EMAIL_ADDRESS }}>
          body: |
            Your LinkedIn li_at cookie has expired. The job tracker cannot scrape new listings until you update it.

            Steps to fix:
            1. Log in to LinkedIn in your browser
            2. Open DevTools → Application → Cookies → linkedin.com
            3. Copy the li_at cookie value
            4. Go to https://github.com/emmayisun/linkedin-job-tracker/settings/secrets/actions
            5. Update the LI_AT_COOKIE secret

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.cookie_expired }}" = "true" ]; then
            echo "⚠️ Cookie expired — alert email sent."
          elif [ "${{ steps.check.outputs.has_new }}" = "true" ]; then
            echo "✅ New jobs found and email sent!"
          else
            echo "ℹ️ No new jobs this run."
          fi
